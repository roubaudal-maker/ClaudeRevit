name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ClaudeRevit\ClaudeRevit.csproj

      - name: Build Release (CI flag skips local Revit deploy)
        run: dotnet build ClaudeRevit\ClaudeRevit.csproj -c Release -p:SkipDeploy=true --no-restore

      - name: Determine version
        id: vars
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if (-not $tag.StartsWith("v")) { $tag = "v$tag" }
          "version=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Zip release artifacts
        shell: pwsh
        run: |
          $src = "ClaudeRevit\bin\Release\release"
          if (-not (Test-Path $src)) {
            throw "Expected release staging folder not found at $src"
          }
          $zipPath = "ClaudeRevit-${{ steps.vars.outputs.version }}.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $zipPath -Force
          Get-Item $zipPath | Format-List Name, Length

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.version }}
          name: ${{ steps.vars.outputs.version }}
          generate_release_notes: true
          files: ClaudeRevit-${{ steps.vars.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
